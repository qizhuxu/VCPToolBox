name: Node.js CI & Docker Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      push-to-ghcr:
        description: '是否推送到 GHCR'
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # 如果项目尚未编写测试，可去掉 continue-on-error 并删除此步骤
    - name: Run tests
      run: npm test --if-present
      continue-on-error: true

    # ---------- Docker 构建 & 推送到 GHCR ----------
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Decide login condition
      id: login_condition
      run: |
        if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "should_login=true" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.push-to-ghcr }}" == "true" ]]; then
          echo "should_login=true" >> $GITHUB_OUTPUT
        else
          echo "should_login=false" >> $GITHUB_OUTPUT
        fi

    - name: Log in to GitHub Container Registry
      if: steps.login_condition.outputs.should_login == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/lioensky/vcptoolbox
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix=,format=short

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: ${{ steps.login_condition.outputs.should_login == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
